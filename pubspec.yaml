name: taki_waki
description: "SoundMesh — intercom & walkie-talkie over local WiFi, no internet."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Realtime audio (capture + playback as PCM stream)
  flutter_sound: ^9.4.16

  # Background / foreground service
  flutter_foreground_task: ^8.10.0

  # إشعار اتصال وارد بملء الشاشة + رنين متواصل (FLAG_INSISTENT)
  flutter_local_notifications: ^17.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Image / avatar picking
  image_picker: ^1.1.2

  # Navigation
  go_router: ^14.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.4.0
  network_info_plus: ^6.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/avatars/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#0A0B14"
  adaptive_icon_foreground: "assets/icon/icon.png"
